services:
  postgres:
    image: postgres:16
    container_name: stock_postgres
    restart: always
    environment:
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_password
      POSTGRES_DB: stock_challenge
    ports:
      - "5433:5432"
    volumes:
      - stock_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: stock_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  stock_postgres_data:
